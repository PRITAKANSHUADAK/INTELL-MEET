apiVersion: apps/v1
kind: Deployment
metadata:
  name: intellmeet-web
  labels:
    app: intellmeet-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: intellmeet-web
  template:
    metadata:
      labels:
        app: intellmeet-web
    spec:
      containers:
      - name: intellmeet-web
        image: intellmeet/web:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: intellmeet-web-service
spec:
  type: LoadBalancer
  selector:
    app: intellmeet-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
