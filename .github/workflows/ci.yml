name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build Web
        run: npm run build --workspace=apps/web
        
      - name: Build API
        run: npm run build --workspace=apps/api
        
  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      
      - name: Build API Image
        run: docker build -t intellmeet/api:latest -f apps/api/Dockerfile .
        
      - name: Build Web Image
        run: docker build -t intellmeet/web:latest -f apps/web/Dockerfile .
